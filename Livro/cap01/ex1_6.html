<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dois numeros e suas somas</title>
</head>
<body>
    <script>
        const primerioNumeroDigitado = Number(prompt('Digite o primeiro número: '));
        const segundoNumeroDigitado = Number(prompt('Digite o segundo núemro: '));

        const soma = primerioNumeroDigitado + segundoNumeroDigitado;

        alert(`A soma de ambos os números é: ${soma}`)
    </script>
</body>
</html>
