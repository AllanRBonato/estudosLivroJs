<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota do Aluno</title>
</head>
<body>
    <h1>Programa Situação do Aluno</h1>

    <form>
        <label>
            Nome do aluno:
            <input type="text" name="nome do aluno" id="nome_do_aluno" required>
        </label>

        <label>
            1ª Nota:
            <input type="text" name="primeira nota" id="primeria_nota" step="0.1" min="0" max="10" required>
        </label>

        <label>
            2ª Nota:
            <input type="text" name="segunda nota " id="segunda_nota" step="0.1" min="0" max="10" required>
        </label>

        <input type="submit" value="Exibir Média e Situação">
    </form>

    <h3 id="resultado_media"></h3>

    <h3 id="resultado_situacao"></h3>

    <script src="./js/ex4_1.js"></script>
</body>
</html>
