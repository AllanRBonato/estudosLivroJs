<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <script>
        const primeiraNota = parseFloat(prompt('Digite a primeira nota: '));
        const segundaNota = parseFloat(prompt('Digite a segunda nota: '));
        const terceiraNota = parseFloat(prompt('Digite a terceira nota: '));

        const formulaAritimetica = (primeiraNota + segundaNota + terceiraNota) / 3;


        alert(`O resultado das 3 nostas do aluno é: ${formulaAritimetica.toFixed(2)}`);
    </script>
</body>
</html>
