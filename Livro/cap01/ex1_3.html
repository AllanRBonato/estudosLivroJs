<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String multiplicavel</title>
</head>
<body>
    
    <script>
        const a = '20';
        const b = a * 2;
        const c = a / 2;
        const d = a - 2;
        const e = a + 2;
        alert(`E: ${b}, ${c}, ${d}, ${e}`)
    </script>

    <!-- no caso a cima so colocar Number() para forçar a transformação de string para numero e poder resolver as contas -->
</body>
</html>
