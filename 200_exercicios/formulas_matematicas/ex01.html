<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01</title>
</head>
<body>
    

    <script>
        let priemrioNumero = parseFloat(prompt('Digite um número: '));
        let segundoNumero = parseFloat(prompt('Digite o seugundo número: '));

        let soma = priemrioNumero + segundoNumero;
        let subtracao = priemrioNumero - segundoNumero;
        let multiplicacao = priemrioNumero * segundoNumero;
        let divisao = priemrioNumero / segundoNumero;


        alert(`Os números digitados tem os seguintes resultados: \nSoma: ${soma}\nSubtração: ${subtracao}\nMultiplicação: ${multiplicacao}\nDivisão: ${divisao.toFixed(2)}`)
        </script>
</body>
</html>
