<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 porcento</title>
</head>
<body>
    <script>
        const valorJantar = Number(prompt('Digite o valor do jantar: '));

        const valorGarcom = valorJantar * 0.10;

        const valorTotal = valorJantar + valorGarcom;

        alert(`O valor do jantar foi: R$${valorJantar.toFixed(2)} e com os 10% da taxa do garçom fica R$${valorGarcom.toFixed(2)}.\nO total com a taxa do Garçom: R$${valorTotal.toFixed(2)}`);
    </script>
</body>
</html>
