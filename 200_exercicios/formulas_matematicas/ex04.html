<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercíco 4</title>
</head>
<body>
    
    <script>
        const primeiroNumero = Number(prompt('Digite o primeiro número: '));
        const segundoNumero = Number(prompt('Digite o segundo número: '));
        const terceiroNumero = Number(prompt('Digite o terceiro número: '));

        const mediaGeometrica = Math.pow(primeiroNumero * segundoNumero * terceiroNumero, 1/3);

        alert(`A média geométrica desses 3 números é: ${mediaGeometrica.toFixed(2)}`);
    </script>
</body>
</html>
