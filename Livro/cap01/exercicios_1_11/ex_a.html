<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrar primos </title>
</head>
<body>
    <script>
        const numeroDigitado = Number(prompt('Digite um número: '));

        const vizinhosMais = numeroDigitado + 1;
        const vizinhosMenos = numeroDigitado - 1;

        alert(`Os vizinhos do número ${numeroDigitado} são: ${vizinhosMenos} e ${vizinhosMais}`);
    </script>
</body>
</html>
