<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média nota do aluno</title>
</head>
<body>
    <script>
        const primeiraNota = parseFloat(prompt('Digite a primeria nota do aluno: '));
        const segundaNota = parseFloat(prompt('Digite a segunda nota do aluno: '));

        const mediaNota = (primeiraNota + segundaNota) / 2;

        alert(`As notas ${primeiraNota.toFixed(2)} e ${segundaNota.toFixed(2)} tem uma média de ${mediaNota.toFixed(2)}`)
    </script>
</body>
</html>
