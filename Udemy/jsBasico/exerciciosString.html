<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form id="frm">
        <label id="texto">
            <input type="text" name="Escreva o nome" id="textoNome">
        </label>

        <label id="botao">
            <input type="submit" value="Enviar">
        </label>
    </form>

    <h2 id="mostraNome"></h2>
    <h2 id="resp1"></h2>
    <h2 id="resp2"></h2>
    <h2 id="resp3"></h2>
    <h2 id="resp4"></h2>
    <h2 id="resp5"></h2>
    <h2 id="resp6"></h2>
    <h2 id="resp7"></h2>
    <script>
        const frm = document.getElementById('frm');
        const mostraNome = document.getElementById('mostraNome');
        const resp1 = document.getElementById('resp1');
        const resp2 = document.getElementById('resp2');
        const resp3 = document.getElementById('resp3');
        const resp4 = document.getElementById('resp4');
        const resp5 = document.getElementById('resp5');
        const resp6 = document.getElementById('resp6');
        const resp7 = document.getElementById('resp7');

        frm.addEventListener('submit', (e )=> {
            e.preventDefault();

            const nome = frm.textoNome.value;



            mostraNome.innerText = `O seu nome é: ${nome}\n`;
            resp1.innerText = `A segunda letra do seu nome é: ${nome.slice(1, 2)} `;
            resp2.innerText = `Qual o primeiro índice da letra a no seu nome: ${nome.indexOf('A')}`;
            resp3.innerText = `Qual o último índice de letra a no seu nome: ${nome.lastIndexOf('a')}`;
            resp4.innerText = `As últimas 2 letras do seu nome são: ${nome.slice(20, 19)}`;
            resp5.innerText = `As palavras do seu nome são: ${nome.slice(0, 5, 7,13)}`;
            resp6.innerText = `Seu nome com letras maiúsculas: ${nome.toUpperCase()}`;
            resp7.innerText = `Seu nome com letras minúsculas: ${nome.toLowerCase()}`;
        })
    </script>
</body>

</html>
