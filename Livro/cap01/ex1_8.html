<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculo de dias e horas</title>
</head>
<body>
    <script>
        const diasDeViagem = Number(prompt('Digite o valor de dias de viagem: '));
        const horasDeViagem = Number(prompt('Horas de viagem: '));

        const horasTotais = (diasDeViagem * 24) + horasDeViagem;

        alert(`Dias de viagem: ${diasDeViagem}\nHoras de viagem: ${horasDeViagem}\nTotal em Horas: ${horasTotais}`)
    </script>
</body>
</html>
