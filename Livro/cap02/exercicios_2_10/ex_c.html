<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermecado JS</title>
</head>
<body>
    <h1>Supermecado JS</h1>

    <form>
        <label>
            Produto:
            <input type="text" name="Produto" id="input-produto">
        </label>

        <label>
            Preço R$:
            <input type="text" name="valor" id="input-valor">
        </label>

        <input type="submit" value="Ver promoção">
    </form>

    <h3 id="resp-nome"></h3>
    <h3 id="resp-valor-cada-produto"></h3>

    <script>
        const form = document.querySelector('form');
        const inputProduto = document.getElementById('input-produto');
        const inputValor = document.getElementById('input-valor');
        const resultadoNome = document.getElementById('resp-nome');
        const resultadoValorCada = document.getElementById('resp-valor-cada-produto');

        form.addEventListener('submit', (e)=> {
            e.preventDefault();

            const nomeProduto = inputProduto.value;
            const valorProduto = Number(inputValor.value);

            const terceiro = valorProduto * 0.5;
            const valorTotal = (valorProduto * 2) + terceiro;


            resultadoNome.innerText = `${nomeProduto} - Promoção: Leve 3 por R$: ${valorTotal.toFixed(2)}`;
            resultadoValorCada.innerText = `O 3° produto custa apenas R$: ${terceiro.toFixed(2)}`;
        })
    </script>
</body>
</html>
