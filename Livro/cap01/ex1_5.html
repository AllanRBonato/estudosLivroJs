<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cáculo do dobro de um número</title>
</head>
<body>
    <script>
        const numeroDigitado = Number(prompt('Digite um número: '));

        const calculeODobro = numeroDigitado * 2;

        alert(`O resultado do número digitado é: ${calculeODobro}`);
    </script>
</body>
</html>
